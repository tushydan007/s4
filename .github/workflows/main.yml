###############################################################################
# S4 – Full-Stack CI/CD Pipeline (Frontend + Backend)
# Trigger: push to main
# Stages:
#   1. Quality Gate – lint, test, coverage for client & server
#   2. Build & Tag – Docker images pushed to DockerHub
#   3. Deploy – Roll out to Amazon ECS (production)
#   4. Notify – Slack/email on failure
###############################################################################

name: S4 CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/s4-client
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/s4-server
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE_FRONTEND: ${{ secrets.ECS_SERVICE_FRONTEND }}
  ECS_SERVICE_BACKEND: ${{ secrets.ECS_SERVICE_BACKEND }}

# ─────────────────────────────────────────────────────────────────────────────
# 1. QUALITY GATES
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Frontend Quality Gate ──────────────────────────────────────────────────
  quality-gate-frontend:
    name: "Quality Gate – Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Enforce coverage thresholds
        run: |
          # Extract coverage summary from the v8 json report
          COVERAGE_FILE="coverage/coverage-final.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::warning::Coverage report not found – skipping threshold check"
            exit 0
          fi
          echo "✅ Coverage report generated successfully"

      - name: Build production bundle
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: frontend-coverage
          path: client/coverage/
          retention-days: 14

  # ── Backend Quality Gate ───────────────────────────────────────────────────
  quality-gate-backend:
    name: "Quality Gate – Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_s4
          POSTGRES_USER: s4_user
          POSTGRES_PASSWORD: s4_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U s4_user -d test_s4"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort coverage

      - name: Lint – flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          # Full lint pass (warnings only – non-blocking)
          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics

      - name: Check formatting – black
        run: black --check --diff .
        continue-on-error: true

      - name: Check import order – isort
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Run tests with coverage
        env:
          DB_NAME: test_s4
          DB_USER: s4_user
          DB_PASSWORD: s4_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: s4.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          ALLOWED_HOSTS: localhost,127.0.0.1
          DEBUG: "True"
        run: |
          coverage run -m pytest --tb=short -q
          coverage xml -o coverage.xml
          coverage report --fail-under=50

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-coverage
          path: server/coverage.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # 2. BUILD & PUSH DOCKER IMAGES
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [quality-gate-frontend, quality-gate-backend]

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      frontend-image: ${{ env.FRONTEND_IMAGE }}
      backend-image: ${{ env.BACKEND_IMAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate image metadata & tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_TAG="$(date +'%Y%m%d')"
          BUILD_NUM="${GITHUB_RUN_NUMBER}"
          VERSION="v1.${BUILD_NUM}.0"
          echo "short_sha=$SHORT_SHA"   >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG"     >> "$GITHUB_OUTPUT"
          echo "build_num=$BUILD_NUM"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Frontend Image ───────────────────────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.date_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ── Backend Image ────────────────────────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.date_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────────────────
  # 3. DEPLOY TO AMAZON ECS
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Amazon ECS"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Backend Task Definition ──────────────────────────────────────────
      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-backend.json
          container-name: s4-server
          image: "${{ env.BACKEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}"

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      # ── Frontend Task Definition ─────────────────────────────────────────
      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-frontend.json
          container-name: s4-client
          image: "${{ env.FRONTEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}"

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_FRONTEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ─────────────────────────────────────────────────────────────────────────
  # 4. NOTIFICATIONS
  # ─────────────────────────────────────────────────────────────────────────

  # ── Failure notification (runs when ANY upstream job fails) ──────────────
  notify-failure:
    name: "Notify – Pipeline Failed"
    runs-on: ubuntu-latest
    needs: [quality-gate-frontend, quality-gate-backend, build-and-push, deploy]
    if: failure()

    steps:
      - name: Send Slack failure notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v2.1.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *S4 Pipeline Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *S4 CI/CD Pipeline Failed*\n\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }

      - name: Send email failure notification
        if: env.NOTIFY_EMAIL != ''
        uses: dawidd6/action-send-mail@v3
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ S4 Pipeline Failed – ${{ github.ref_name }} @ ${{ github.sha }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: S4 CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            S4 CI/CD Pipeline Failed

            Branch:  ${{ github.ref_name }}
            Commit:  ${{ github.sha }}
            Author:  ${{ github.actor }}
            Run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Check the workflow run for details.

  # ── Success notification ─────────────────────────────────────────────────
  notify-success:
    name: "Notify – Deployment Successful"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()

    steps:
      - name: Send Slack success notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v2.1.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *S4 Deployed to Production*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *S4 Deployed to Production*\n\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }

      - name: Send email success notification
        if: env.NOTIFY_EMAIL != ''
        uses: dawidd6/action-send-mail@v3
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ S4 Deployed – ${{ github.ref_name }} @ ${{ github.sha }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: S4 CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            S4 CI/CD Pipeline Succeeded

            Branch:  ${{ github.ref_name }}
            Commit:  ${{ github.sha }}
            Author:  ${{ github.actor }}
            Run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Both frontend and backend have been deployed to production on Amazon ECS.
